kind: DataContract
apiVersion: v3.0.0
id: week5-event-records
info:
  title: Week5 Event Records
  version: 1.0.0
  owner: week5-team
  description: Auto-generated contract for week5-event-records. 1198 records profiled.
servers:
  local:
    type: local
    path: outputs/week5/events.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence must remain in 0.0-1.0 float range.
schema:
  event_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  event_type:
    type: string
    required: true
  aggregate_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  aggregate_type:
    type: string
    required: true
  sequence_number:
    type: integer
    required: true
    description: Numeric field. Observed range [1.00, 13.00], mean=5.34, stddev=3.24.
  schema_version:
    type: string
    required: true
  occurred_at:
    type: string
    required: true
    format: date-time
  recorded_at:
    type: string
    required: true
    format: date-time
  meta_causation_id:
    type: string
    required: false
    format: uuid
    pattern: ^[0-9a-f-]{36}$
    enum: []
  meta_correlation_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  meta_user_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f-]{36}$
  meta_source_service:
    type: string
    required: true
quality:
  type: SodaChecks
  specification:
    checks for week5-event-records:
    - row_count >= 1
    - missing_count(event_id) = 0
    - missing_count(event_type) = 0
    - missing_count(aggregate_id) = 0
    - missing_count(aggregate_type) = 0
    - missing_count(sequence_number) = 0
lineage:
  upstream: []
  downstream: []
