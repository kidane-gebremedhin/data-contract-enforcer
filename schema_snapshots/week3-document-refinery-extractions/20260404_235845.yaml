kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week3 Document Refinery Extractions
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for week3-document-refinery-extractions. 55
    records profiled.
servers:
  local:
    type: local
    path: outputs/week3/extractions_violated.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: confidence uses 0-100 numeric scale.
schema:
  doc_id:
    type: integer
    required: true
    minimum: 7000
    maximum: 9800
    description: Numeric field. Observed range [7000.0, 9800.0], mean=8295.99, stddev=731.26.
  source_path:
    type: string
    required: true
  source_hash:
    type: string
    required: true
    pattern: ^[a-f0-9]{64}$
    description: SHA-256 hash.
  extraction_model:
    type: string
    required: true
  processing_time_ms:
    type: integer
    required: true
    minimum: 838
    maximum: 2750
    description: Numeric field. Observed range [838.0, 2750.0], mean=1821.99, stddev=529.11.
  extracted_at:
    type: string
    required: true
    format: date-time
  extracted_facts:
    type: object
    required: true
    properties:
      fact_id:
        type: string
        required: true
        format: uuid
        pattern: ^[0-9a-f-]{36}$
      text:
        type: string
        required: true
      confidence:
        type: number
        required: true
        minimum: 0.0
        maximum: 100.0
        description: Confidence score (0-100 scale). Observed range [0.00, 98.00],
          mean=83.97, stddev=9.61.
      page_ref:
        type: integer
        required: true
        minimum: 3
        maximum: 19
        description: Numeric field. Observed range [3.0, 19.0], mean=13.47, stddev=4.00.
      source_excerpt:
        type: string
        required: true
quality:
  type: SodaChecks
  specification:
    checks for week3-document-refinery-extractions:
    - row_count >= 1
    - missing_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - min(extracted_facts.confidence) >= 0.0
    - max(extracted_facts.confidence) <= 98.0
lineage:
  upstream: []
  downstream:
  - id: pipeline::week4
    description: Consumes data from week3
    fields_consumed:
    - doc_id
    - extracted_facts
    breaking_if_changed:
