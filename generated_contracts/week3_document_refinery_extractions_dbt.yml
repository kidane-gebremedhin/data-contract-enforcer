version: 2
models:
- name: week3_document_refinery_extractions
  description: dbt schema tests auto-generated from Bitol contract week3-document-refinery-extractions.
    Requires dbt_expectations package for pattern and range tests.
  columns:
  - name: doc_id
    description: Auto-generated from contract week3-document-refinery-extractions
    data_type: string
    tests:
    - not_null
    - unique
    - dbt_expectations.expect_column_values_to_match_regex:
        regex: ^[0-9a-f-]{36}$
  - name: source_path
    description: Auto-generated from contract week3-document-refinery-extractions
    data_type: string
    tests:
    - not_null
  - name: source_hash
    description: SHA-256 hash.
    data_type: string
    tests:
    - not_null
