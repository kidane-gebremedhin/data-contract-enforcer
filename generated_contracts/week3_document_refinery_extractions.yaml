kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week3 Document Refinery Extractions
  version: 1.0.0
  owner: week3-team
  description: Auto-generated contract for week3-document-refinery-extractions. 55
