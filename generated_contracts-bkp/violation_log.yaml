kind: DataContract
apiVersion: v3.0.0
id: week7-violation-log
info:
  title: Week 7 Data Contract Enforcer — Violation Log
  version: 1.0.0
  owner: week7-enforcer-team
  description: >
    One record per detected contract violation. Each record includes
    a blame chain, blast radius, and severity classification.
    Designed for ingestion by Week 8 Sentinel alert pipeline.
servers:
  local:
    type: local
    path: violation_log/violations.jsonl
    format: jsonl
terms:
  usage: Internal data quality signal. Consumed by Week 8 Sentinel.
  limitations: blast_radius.source must be one of registry, lineage, both.
schema:
  violation_id:
    type: string
    format: uuid
    required: true
    unique: true
    description: Unique identifier for this violation event.
  check_id:
    type: string
    required: true
    description: >
      Dot-separated contract check identifier.
      Format: {contract_id}.{field_name}.{check_type}
  detected_at:
    type: string
    format: date-time
    required: true
    description: ISO 8601 timestamp when violation was detected.
  severity:
    type: string
    enum: [CRITICAL, HIGH, MEDIUM, LOW]
    required: true
  message:
    type: string
    required: true
    description: Human-readable violation description.
  actual_value:
    type: string
    required: true
  expected:
    type: string
    required: true
  blame_chain:
    type: array
    required: true
    description: Ranked list of suspect commits (max 5).
    items:
      rank:
        type: integer
        minimum: 1
        maximum: 5
      commit_hash:
        type: string
        pattern: "^[0-9a-f]{40}$"
      author:
        type: string
      commit_timestamp:
        type: string
      commit_message:
        type: string
      confidence_score:
        type: number
        minimum: 0.0
        maximum: 1.0
  blast_radius:
    type: object
    required: true
    description: Registry-sourced blast radius with lineage enrichment.
    properties:
      source:
        type: string
        enum: [registry, lineage, both]
      direct_subscribers:
        type: array
      transitive_nodes:
        type: array
      contamination_depth:
        type: integer
        minimum: 0
      affected_pipelines:
        type: array
      estimated_records:
        type: integer
        minimum: 0
  records_failing:
    type: integer
    minimum: 0
    required: true
quality:
  type: SodaChecks
  specification:
    checks for week7-violation-log:
    - row_count >= 1
    - missing_count(violation_id) = 0
    - missing_count(check_id) = 0
    - missing_count(severity) = 0
lineage:
  upstream:
  - id: week7-enforcer
    description: Produced by ViolationAttributor pipeline
  downstream:
  - id: week8-sentinel
    description: Consumed as data quality signal for alert routing
    fields_consumed: [violation_id, check_id, severity, detected_at, blast_radius]
    breaking_if_changed: [severity, blast_radius.source]
  registry_subscribers:
  - id: week8-sentinel
    team: week8
    breaking_fields: [severity, blast_radius.source]
  note: Blast radius uses registry_subscribers as primary source.
